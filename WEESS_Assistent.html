## WIE POWERTOWER FUNKTIONIERT
- "Nach-dem-Zähler"-System: verteilt PV-Strom selektiv an einzelne WE
- Jede Wohnung = 100% PV ODER 100% Netz – niemals beides gleichzeitig
- Umschaltzeit: nahezu 0ms – keine spürbare Unterbrechung
- Allgemeinzähler: NUR für PV-Überschuss-Messung (Einspeisung), liefert KEINEN Netzstrom an Wohnungen
- PV inaktiv + Batterie leer → Netzstrom wie gewohnt
- PV aktiv → PowerTower schaltet Wohnungen auf PV (physisch vom Netz getrennt)
- Teillast (>11kW) → intelligente Gateway-Auswahl, Restgateways auf Netz
- Failsafe: Bei Gateway-Ausfall → automatisch auf Netzversorgung, Fehler an Server gemeldet
- Zählersperrung (Zahlungsverzug): Gateway deaktiviert → weder Netz noch PV

## NETZBETREIBER & ANMELDUNG
- Anmeldung als: MK A2-Anlage mit Überschusseinspeisung
- Bestandszähler oft unverändert – kein Umbau im Zählerschrank nötig
- Referenzen: mehrere Projekte in Deutschland mit Zustimmung von Stadtwerken
- Zähler MID-konform, Netz- und PV-Ströme klar getrennt
- §14a EnWG: Wallbox, Wärmepumpe bleiben voll netzdienlich steuerbar
- Sicherheitskonzept: Zwangsgeführte Relaiskontakte, Selbsttest bei jedem Schaltvorgang, Rückmeldung Relaisstellung

## SYSTEMGRENZEN & DIMENSIONIERUNG
- Minimum: 4 WE (ab 2 WE technisch möglich, ab 4 wirtschaftlich)
- Maximum: 72 WE (12 PowerTower × 6 Slots)
- PowerTower: 6 Slots (1 Gateway/WE + 1 Allgemeinstrom)
- Zwingend: mind. 1 Zugspitze pro Anlage
- Ab 2 PowerTower: Verkabelung zwischen Einheiten nötig
- Max. Strom je Gateway: 32A, max. 11kW Grünstrom

## MIETVERTRAG-ERGÄNZUNGSKLAUSEL (Bestandsvertragserweiterung)
Für bestehende Mietverhältnisse – optionale Ergänzung zum Mietvertrag:
- Charakter: KEIN Vollversorgungsvertrag, nur ergänzende PV-Stromlieferung
- Mieter behalten eigenen Stromvertrag mit Energieversorger
- Messung: eichrechtskonformer MID-Zähler je Wohnung, getrennt von Kaltmiete
- Preisgestaltung: frei wählbar (Cent/kWh + MwSt.)
- Freiwilligkeit: Teilnahme FREIWILLIG, keine Mietnachteile bei Ablehnung
- Kündigung: 1 Monat zum Monatsende, beidseitig, Mietvertrag bleibt unberührt
- Außerordentliche Kündigung durch Vermieter: wenn Anlage dauerhaft eingestellt wird oder Rechtslage sich ändert

## WEG-BESCHLUSS MUSTER (Eigentümergemeinschaft)
Für WEG-Projekte – Beschlussmuster vorhanden:
- Mehrheit nötig: 2/3 der Stimmen + 1/2 der Miteigentumsanteile (§21 Abs. 2 Nr. 1 WEG)
- Sonderumlage: nach Miteigentumsanteilen, fällig 2 Wochen nach Beschluss
- Anlage wird als Gebäudestromanlage i.S.d. §42a EnWG betrieben
- Hausverwaltung bestimmt Konditionen nach billigem Ermessen
- Beschluss erst nach Bestandskraft ausführen (1 Monat Anfechtungsfrist)
- Kostenüberschreitung >5%: neue Eigentümerversammlung einberufen

## PV-STROM-LIEFERVERTRAG (GGV-Modell nach §42b EnWG)
Für gemeinschaftliche Gebäudeversorgung (nicht PowerTower-Standard, sondern GGV-Modell):
- Aufteilungsschlüssel: dynamisch, viertelstundenweise nach gleichzeitigem Verbrauch
- Grundpreis + Arbeitspreis (frei wählbar)
- Abschlagszahlungen möglich, Abrechnung spätestens 6 Wochen nach Zeitraum
- Kündigung: 1 Monat Frist, nach Grundlaufzeit monatlich kündbar
- Vertrag endet automatisch bei Auszug (Haushaltskunde)
- Preisanpassung: möglich wenn Marktpreise um >5% von 2024 abweichen
- Schlichtungsstelle Energie e.V., Berlin (bei Streit)
- Betrieb, Wartung, Erhaltung: Aufgabe des Lieferanten (Vermieter), mit Entgelt abgegolten

## MUSTERRECHNUNG FÜR MIETER
Bestandteile:
- Grundpreis + Strompreis (inkl. aller Abgaben, Umlagen, Steuern)
- Zählerstand Anfang/Ende + Verbrauch kWh
- Identifikationsnummer Entnahmestelle, Zählernummer, Netzbetreiber
- Abschlagszahlungen und Gutschriften
- Neue monatliche Abschlagszahlung

## WEESS vs. ALTERNATIVEN
WEESS Vorteile: Plug & Play, kein Drittanbieter, Vermieter kein Vollversorger, geringe Bürokratie (MK A2), Submetering integriert, MID-konform, freie Netzwahl, IAB abzugsfähig, Immobilienwert +, kostenlose App 10 Jahre
Klassischer Mieterstrom: Drittpartner, Vermieter = Energieversorger, virtuelle Summenzähler, monatliche Folgekosten, EEG-Zuschlag (einziger Vorteil)
GGV: Drittpartner, dynamische Aufteilung, aufwändiger, langsame Amortisation
WEESS nicht geeignet: einphasig (HAK-Aufrüstung nötig), <4 WE, >72 WE

- VDE §430: Schieflast/Phasenversorgung; VDE-AR-N 4105: Netzanschluss
- DIN VDE 0100-520, VDE-AR-N 4100: Zählerverlegung

const QUICK = {
  vertrieb: [
    { label: "Wie funktioniert PowerTower?", q: "Erkläre mir wie das PowerTower-System technisch funktioniert – für ein Kundengespräch." },
    { label: "Vertragsunterlagen erklären", q: "Welche Verträge brauche ich für WEESS und was steht da drin?" },
    { label: "WEG-Beschluss – was beachten?", q: "Was muss bei einem WEG-Beschluss für eine WEESS-Anlage beachtet werden?" },
    { label: "Mietvertrag-Ergänzung", q: "Wie wird WEESS in bestehende Mietverträge eingebunden?" },
    { label: "Wirtschaftlichkeit Beispiel", q: "Zeig mir ein reales Wirtschaftlichkeitsbeispiel für WEESS." },
    { label: "Netzbetreiber-Anmeldung", q: "Wie wird WEESS beim Netzbetreiber angemeldet?" },
  ],
  elektriker: [
    { label: "Inbetriebnahme komplett", q: "Erkläre mir die vollständige Inbetriebnahme Schritt für Schritt." },
    { label: "Verdrahtung PowerTower", q: "Wie wird der PowerTower verdrahtet – welche Kabel wohin?" },

    { label: "Parallelsystem einrichten", q: "Wie richte ich mehrere Zugspitzen im Parallelbetrieb ein?" },
    { label: "Smart Meter einstellen", q: "Wie werden Smart Meter und PowerTower korrekt eingestellt?" },
    { label: "4-Strings-Szenario", q: "Wie schließe ich 4 verschiedene PV-Strings an eine Zugspitze an?" },
  ],
};

let mode=null, msgs=[], loading=false;

const BOLT = '<svg width="11" height="11" viewBox="0 0 24 24"><path d=\"M13 2L3 14h9l-1 8 10-12h-9l1-8z\" fill=\"#4ade80\"/></svg>';

window.addEventListener('load', function() { renderMode(); });

function renderMode() {
  document.getElementById('body').innerHTML = '<div class="ms"><h2>Wer bist du?</h2><p>Ich passe meine Antworten an deine Rolle an.</p><div class="mg"><button class="mc" onclick="setMode(\'vertrieb\')"><div style="font-size:26px;margin-bottom:8px">💼</div><div style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:4px">Vertrieb</div><div style="font-size:11px;color:#7d8590;line-height:1.5">Kundenfragen, Vertragsthemen, Wirtschaftlichkeit</div></button><button class="mc" onclick="setMode(\'elektriker\')"><div style="font-size:26px;margin-bottom:8px">⚡</div><div style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:4px">Elektriker</div><div style="font-size:11px;color:#7d8590;line-height:1.5">Installation, Inbetriebnahme, Normen</div></button></div></div>';
  document.getElementById('ia').style.display = 'none';
  document.getElementById('btn-new').style.display = 'none';
  document.getElementById('btn-role').style.display = 'none';
  document.getElementById('bdg').style.display = 'none';
}

function setMode(m) {
  mode = m; msgs = [];
  var bdg = document.getElementById('bdg');
  bdg.textContent = m === 'elektriker' ? '⚡ Elektriker' : '💼 Vertrieb';
  bdg.className = 'badge ' + (m === 'elektriker' ? 'e' : 'v');
  bdg.style.display = '';
  document.getElementById('btn-role').style.display = '';
  document.getElementById('ia').style.display = '';
  renderWelcome();
}

function renderWelcome() {
  var q = QUICK[mode] || [];
  var btns = q.map(function(x) { return '<button class="qb" onclick="sq(' + JSON.stringify(x.q) + ')">' + x.label + '</button>'; }).join('');
  document.getElementById('body').innerHTML = '<div class="wl"><h3>' + (mode==='elektriker' ? 'Technische Frage?' : 'Kundenfrage oder Wirtschaftlichkeit?') + '</h3><p>' + (mode==='elektriker' ? 'Installation, IBN, App, Normen, Datenblätter.' : 'Vertragsthemen, WEG, Wirtschaftlichkeit, Datenblätter.') + '</p><div class="qg">' + btns + '</div></div>';
  chips();
  document.getElementById('btn-new').style.display = 'none';
}

function chips() {
  var q = QUICK[mode] || [];
  document.getElementById('chips').innerHTML = msgs.length > 0 ? q.slice(0,3).map(function(x) { return '<button class="chip" onclick="sq(' + JSON.stringify(x.q) + ')">' + x.label + '</button>'; }).join('') : '';
}

function sq(q) { doSend(q); }

function send() {
  var ta = document.getElementById('ta');
  var q = ta.value.trim();
  if (!q || loading) return;
  ta.value = ''; ta.style.height = 'auto';
  document.getElementById('sb').disabled = true;
  doSend(q);
}

async function doSend(q) {
  if (loading) return;
  loading = true;
  var ctx = mode === 'elektriker' ? '[Elektriker] ' : '[Vertrieb] ';
  msgs.push({role:'user', content: ctx + q});
  renderMsgs(true);
  document.getElementById('btn-new').style.display = '';
  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1024,system:SP,messages:msgs})
    });
    if (!r.ok) throw new Error('API ' + r.status);
    var d = await r.json();
    if (d.error) throw new Error(d.error.message);
    msgs.push({role:'assistant', content: d.content[0].text});
    renderMsgs(false);
  } catch(e) {
    renderMsgs(false, e.message.includes('529') ? 'Server kurz überlastet – nochmal senden.' : e.message);
  }
  loading = false;
  chips();
}

function renderMsgs(dots, err) {
  var html = '<div class="msgs">';
  msgs.forEach(function(m) {
    var t = m.content.replace(/^\[(Elektriker|Vertrieb)\] /, '');
    if (m.role === 'user') {
      html += '<div class="mu"><div class="bu">' + esc(t) + '</div></div>';
    } else {
      html += '<div class="ma"><div class="av">' + BOLT + '</div><div class="ba">' + md(t) + '</div></div>';
    }
  });
  if (dots) html += '<div class="ma"><div class="av">' + BOLT + '</div><div class="ba"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>';
  if (err) html += '<div class="er">⚠ ' + esc(err) + '</div>';
  html += '</div>';
  var body = document.getElementById('body');
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

function md(text) {
  return text.split('\n').map(function(line) {
    if (line.startsWith('## ')) return '<div class="md-h2">' + il(line.slice(3)) + '</div>';
    if (line.startsWith('### ')) return '<div class="md-h3">' + il(line.slice(4)) + '</div>';
    if (line.startsWith('- ')) return '<div class="md-li">' + il(line.slice(2)) + '</div>';
    if (line === '') return '<div style="height:5px"></div>';
    return '<div>' + il(line) + '</div>';
  }).join('');
}

function il(t) {
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:#e6edf3">$1</strong>');
  t = t.replace(/`([^`]+)`/g,'<code style="background:#1f2435;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.87em;color:#4ade80">$1</code>');
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a class="md-a" href="$2" target="_blank" rel="noopener">$1 ↗</a>');
  return t;
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ar(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; document.getElementById('sb').disabled=!el.value.trim()||loading; }
function newChat() { msgs=[]; renderWelcome(); document.getElementById('btn-new').style.display='none'; }
function changeRole() { mode=null; msgs=[]; renderMode(); }
</script>
